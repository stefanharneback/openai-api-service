services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: oais
      POSTGRES_PASSWORD: oais_local_dev
      POSTGRES_DB: oais
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oais -d oais"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
